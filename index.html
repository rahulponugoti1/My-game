<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tarnished Arena</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(ellipse at center, #0a0510 0%, #000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .subtitle {
            color: #8866aa;
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0.85;
        }

        h1 {
            color: #d4af37;
            font-size: clamp(42px, 8vw, 88px);
            letter-spacing: 14px;
            text-shadow: 0 0 40px #d4af3788, 0 0 100px #d4af3744;
            margin-bottom: 6px;
        }

        .tagline {
            color: #cc8844;
            font-size: 12px;
            letter-spacing: 5px;
            margin-bottom: 50px;
        }

        #high-score-box {
            background: rgba(212, 175, 55, 0.07);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 18px;
            padding: 18px 50px;
            text-align: center;
            margin-bottom: 44px;
        }

        #high-score-box .label {
            color: #666;
            font-size: 10px;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        #high-score-box .value {
            color: #d4af37;
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 3px;
        }

        #high-score-box .sub {
            color: #555;
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        #press-enter {
            color: #d4af37;
            font-size: 16px;
            letter-spacing: 8px;
            margin-bottom: 44px;
            animation: blink 1.3s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.15;
            }
        }

        .controls-box {
            color: #444;
            font-size: 11px;
            text-align: center;
            line-height: 2.1;
            letter-spacing: 1px;
            border-top: 1px solid #1a1a1a;
            padding-top: 22px;
            width: 340px;
        }

        .controls-box span {
            color: #777;
        }

        /* subtle animated particles behind text */
        canvas#bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>

    <div class="subtitle">⚔ &nbsp; A R E N A &nbsp; ⚔</div>
    <h1>TARNISHED</h1>
    <div class="tagline">SURVIVE THE ENDLESS DARK</div>

    <div id="high-score-box">
        <div class="label">BEST RUN — WAVES CLEARED</div>
        <div class="value" id="hs-display">0</div>
        <div class="sub">BEAT YOUR RECORD</div>
    </div>

    <div id="press-enter">PRESS ENTER TO BEGIN</div>

    <div class="controls-box">
        <span>WASD</span> — MOVE &nbsp;|&nbsp; <span>MOUSE</span> — LOOK<br>
        <span>LEFT CLICK</span> — SWORD ATTACK &nbsp;|&nbsp; <span>R</span> — RESTART<br>
        Collect <span>⚡ healing orbs</span> to restore +35 HP<br>
        Survive endless waves — enemies grow stronger
    </div>

    <script>
        // Load and display high score
        let hs = 0;
        try { hs = parseInt(localStorage.getItem('tarnished_hs') || '0') || 0; } catch (e) { }
        document.getElementById('hs-display').textContent = hs;

        // Enter key → go to game
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                window.location.href = 'game.html';
            }
        });

        // Simple particle background
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const dots = Array.from({ length: 120 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            speed: Math.random() * 0.3 + 0.05,
            opacity: Math.random() * 0.4 + 0.05
        }));

        function drawBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const d of dots) {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${d.opacity})`;
                ctx.fill();
                d.y -= d.speed;
                if (d.y < -2) { d.y = canvas.height + 2; d.x = Math.random() * canvas.width; }
            }
            requestAnimationFrame(drawBg);
        }
        drawBg();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>

</html>
